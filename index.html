<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আইডি কার্ড জেনারেটর এবং ডাউনলোডার</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            max-width: 900px;
            width: 100%;
            justify-content: center;
        }

        /* ফরম সেকশন */
        .form-section {
            flex: 1;
            min-width: 300px;
        }

        .form-section h2 {
            margin-bottom: 20px;
            color: #333;
            font-size: 22px;
            border-bottom: 2px solid #007bff;
            padding-bottom: 8px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.2);
        }

        /* আইডি কার্ড প্রিভিউ সেকশন */
        .preview-section {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            border: 1px dashed #ccc;
        }

        .preview-section h2 {
            margin-bottom: 20px;
            color: #333;
            font-size: 20px;
        }

        /* আইডি কার্ডের ডিজাইন */
        .id-card {
            width: 320px;
            height: 480px;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            overflow: hidden;
            position: relative;
            text-align: center;
            border: 1px solid #e0e0e0;
        }

        /* কার্ডের উপরের অংশ (Header) */
        .card-header {
            background: linear-gradient(135deg, #007bff, #0056b3);
            padding: 20px 10px;
            color: white;
        }

        .card-header h3 {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-header p {
            font-size: 11px;
            opacity: 0.9;
            margin-top: 3px;
        }

        /* ছবির অংশ */
        .card-avatar-container {
            margin-top: -45px;
        }

        .card-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 4px solid #fff;
            object-fit: cover;
            background: #eee;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* কার্ডের ভেতরের তথ্য */
        .card-body {
            padding: 15px 25px;
        }

        .card-name {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .card-role {
            display: inline-block;
            font-size: 12px;
            background: #e1f0ff;
            color: #007bff;
            padding: 4px 12px;
            border-radius: 50px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .card-details {
            text-align: left;
            font-size: 13px;
            color: #555;
            line-height: 1.8;
        }

        .card-details div {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #f0f0f0;
            padding: 4px 0;
        }

        .card-details span.label {
            font-weight: bold;
            color: #777;
        }

        /* কার্ডের নিচের অংশ (Footer) */
        .card-footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: #333;
            color: #fff;
            padding: 8px 0;
            font-size: 11px;
            letter-spacing: 1px;
        }

        /* বাটন গ্রুপ */
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            width: 100%;
            justify-content: center;
        }

        .btn {
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            font-size: 14px;
        }

        .download-btn {
            background: #28a745;
            color: white;
        }

        .download-btn:hover {
            background: #218838;
        }

        .print-btn {
            background: #007bff;
            color: white;
        }

        .print-btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="form-section">
        <h2>তথ্য দিন</h2>
        <form id="idForm">
            <div class="form-group">
                <label for="inputOrg">প্রতিষ্ঠানের নাম</label>
                <input type="text" id="inputOrg" value="আমার কোম্পানি লিমিটেড" placeholder="প্রতিষ্ঠানের নাম লিখুন">
            </div>
            <div class="form-group">
                <label for="inputName">পূর্ণ নাম</label>
                <input type="text" id="inputName" value="সফিকুল ইসলাম" placeholder="নাম লিখুন">
            </div>
            <div class="form-group">
                <label for="inputRole">পদবী / রোল</label>
                <input type="text" id="inputRole" value="ওয়েব ডেভেলপার" placeholder="যেমন: ম্যানেজার, ছাত্র">
            </div>
            <div class="form-group">
                <label for="inputId">আইডি নাম্বার</label>
                <input type="text" id="inputId" value="ID-202605" placeholder="আইডি নম্বর লিখুন">
            </div>
            <div class="form-group">
                <label for="inputPhone">মোবাইল নাম্বার</label>
                <input type="text" id="inputPhone" value="+৮৮০ ১৭০০-০০০০০০" placeholder="মোবাইল নম্বর">
            </div>
            <div class="form-group">
                <label for="inputBlood">রক্তের গ্রুপ</label>
                <select id="inputBlood">
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+" selected>B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                </select>
            </div>
            <div class="form-group">
                <label for="inputPhoto">প্রোফাইল ছবি আপলোড করুন</label>
                <input type="file" id="inputPhoto" accept="image/*">
            </div>
        </form>
    </div>

    <div class="preview-section">
        <h2>লাইভ প্রিভিউ</h2>
        
        <div class="id-card" id="idCardToPrint">
            <div class="card-header">
                <h3 id="cardOrg">আমার কোম্পানি লিমিটেড</h3>
                <p>আইдেন্টিটি কার্ড</p>
            </div>
            
            <div class="card-avatar-container">
                <img id="cardAvatar" src="https://via.placeholder.com/100" alt="Avatar" class="card-avatar">
            </div>
            
            <div class="card-body">
                <div class="card-name" id="cardName">সফিকুল ইসলাম</div>
                <div class="card-role" id="cardRole">ওয়েব ডেভেলপার</div>
                
                <div class="card-details">
                    <div><span class="label">আইডি নং:</span> <span id="cardId">ID-202605</span></div>
                    <div><span class="label">মোবাইল:</span> <span id="cardPhone">+৮৮০ ১৭০০-০০০০০০</span></div>
                    <div><span class="label">রক্তের গ্রুপ:</span> <span id="cardBlood">B+</span></div>
                </div>
            </div>
            
            <div class="card-footer">
                WWW.YOURWEBSITE.COM
            </div>
        </div>

        <div class="button-group">
            <button class="btn download-btn" id="downloadBtn">JPEG সেভ করুন</button>
            <button class="btn print-btn" onclick="window.print()">প্রিন্ট করুন</button>
        </div>
    </div>

</div>

<script>
    // ফরমের ইনপুট এলিমেন্টগুলো ধরা
    const inputOrg = document.getElementById('inputOrg');
    const inputName = document.getElementById('inputName');
    const inputRole = document.getElementById('inputRole');
    const inputId = document.getElementById('inputId');
    const inputPhone = document.getElementById('inputPhone');
    const inputBlood = document.getElementById('inputBlood');
    const inputPhoto = document.getElementById('inputPhoto');

    // আইডি কার্ডের টেক্সট এলিমেন্টগুলো ধরা
    const cardOrg = document.getElementById('cardOrg');
    const cardName = document.getElementById('cardName');
    const cardRole = document.getElementById('cardRole');
    const cardId = document.getElementById('cardId');
    const cardPhone = document.getElementById('cardPhone');
    const cardBlood = document.getElementById('cardBlood');
    const cardAvatar = document.getElementById('cardAvatar');
    const downloadBtn = document.getElementById('downloadBtn');

    // ইভেন্ট লিসেনার যোগ করা (টাইপ করার সাথে সাথে আপডেট হবে)
    inputOrg.addEventListener('input', () => cardOrg.innerText = inputOrg.value || 'প্রতিষ্ঠানের নাম');
    inputName.addEventListener('input', () => cardName.innerText = inputName.value || 'পূর্ণ নাম');
    inputRole.addEventListener('input', () => cardRole.innerText = inputRole.value || 'পদবী');
    inputId.addEventListener('input', () => cardId.innerText = inputId.value || '---');
    inputPhone.addEventListener('input', () => cardPhone.innerText = inputPhone.value || '---');
    inputBlood.addEventListener('change', () => cardBlood.innerText = inputBlood.value);

    // ছবি আপলোড এবং লাইভ ভিউ করার লজিক
    inputPhoto.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                cardAvatar.setAttribute('src', e.target.result);
            }
            reader.readAsDataURL(file);
        }
    });

    // আইডি কার্ডটি JPEG ইমেজ হিসেবে ফোনে বা কম্পিউটারে ডাউনলোড করার লজিক
    downloadBtn.addEventListener('click', function() {
        const card = document.getElementById('idCardToPrint');
        
        // ইমেজ কোয়ালিটি বা ক্লিয়ারিটি ২ গুণ (scale: 2) বৃদ্ধি করা হয়েছে যেন ফেটে না যায়
        html2canvas(card, {
            scale: 2,
            useCORS: true,
            allowTaint: true
        }).then(canvas => {
            // ক্যানভাসকে JPEG ফরম্যাটে রূপান্তর (কোয়ালিটি ৯০%)
            const image = canvas.toDataURL('image/jpeg', 0.9);
            
            // একটি ভার্চুয়াল লিঙ্ক তৈরি করে অটোমেটিক ডাউনলোড ট্রগার করা
            const link = document.createElement('a');
            // সদস্যের নামানুসারে ফাইলের নাম তৈরি হবে (স্পেসের জায়গায় আন্ডারস্কোর হবে)
            const memberName = inputName.value.trim().replace(/\s+/g, '_') || 'id_card';
            link.download = `${memberName}_id_card.jpg`;
            link.href = image;
            link.click();
        }).catch(error => {
            console.error('ইমেজ তৈরিতে সমস্যা হয়েছে:', error);
            alert('দুঃখিত, ইমেজটি ডাউনলোড করা যায়নি। আবার চেষ্টা করুন।');
        });
    });
</script>

</body>
</html>
