<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>চিতোষী উপজেলা চাই - পোস্ট মেকার</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: #f0fdf4;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <div class="bg-white p-6 rounded-2xl shadow-lg border border-green-100 flex flex-col justify-between">
            <div>
                <h2 class="text-2xl font-bold text-center text-green-700 mb-6">তথ্য যুক্ত করুন</h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-gray-700 font-semibold mb-1">নাম</label>
                        <input type="text" id="inputName" oninput="updatePost()" placeholder="আপনার নাম লিখুন" 
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none">
                    </div>

                    <div>
                        <label class="block text-gray-700 font-semibold mb-1">মন্তব্য</label>
                        <textarea id="inputComment" rows="3" oninput="updatePost()" placeholder="আপনার মন্তব্য বা মতামত লিখুন" 
                                  class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none"></textarea>
                    </div>

                    <div>
                        <label class="block text-gray-700 font-semibold mb-1">ছবি আপলোড করুন</label>
                        <input type="file" id="inputImage" onchange="updatePost()" accept="image/*" 
                               class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100 cursor-pointer">
                    </div>

                    <button onclick="updatePost()" 
                            class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-md cursor-pointer">
                        পোস্টে যুক্ত করুন
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-lg border border-green-100 flex flex-col items-center justify-between">
            <h2 class="text-xl font-bold text-gray-700 mb-4 text-center">সবাই একসাথে আওয়াজ তুলুন</h2>
            
            <div id="posterCard" class="w-full max-w-sm bg-gradient-to-b from-green-50 to-green-100 rounded-2xl p-6 border-4 border-green-600 shadow-inner relative flex flex-col justify-between aspect-square">
                
                <div class="flex justify-between items-start gap-4">
                    <div class="w-24 h-24 bg-gray-200 rounded-full border-4 border-white shadow-md flex items-center justify-center overflow-hidden shrink-0">
                        <img id="viewImage" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23cccccc'/></svg>" alt="User Photo" class="w-full h-full object-cover">
                    </div>
                    
                    <div class="flex-1 bg-white/90 p-3 rounded-xl border border-green-200 min-h-[96px] max-h-[120px] overflow-y-auto">
                        <p class="text-xs text-gray-500 font-bold mb-0.5">মন্তব্য:</p>
                        <p id="viewComment" class="text-sm text-gray-700 font-medium leading-relaxed">চিতোষী এলাকার সার্বিক উন্নয়নের লক্ষ্যে অবিলম্বে উপজেলা ঘোষণা করা হোক।</p>
                    </div>
                </div>

                <div class="my-2 text-center flex flex-col items-center justify-center relative">
                    <div class="mb-2 max-w-[60px] max-h-[60px] overflow-hidden">
                        <img id="logoView" src="https://i.postimg.cc/6QJ02jGV/20260518-125112.png" alt="Logo" class="w-full h-full object-contain">
                    </div>

                    <div class="bg-red-600 text-white font-black text-xl px-4 py-1 rounded-md shadow-sm transform -rotate-1 tracking-wide">
                        চিতোষী নামে
                    </div>
                    <div class="text-green-700 font-black text-2xl mt-1 tracking-wider drop-shadow-sm">
                        উপজেলাচাই
                    </div>
                </div>

                <div class="w-full bg-green-700 rounded-xl py-2 shadow-md text-center">
                    <span id="viewName" class="text-white font-bold text-base block w-full">আপনার নাম</span>
                </div>
            </div>

            <button onclick="downloadJPEG()" 
                    class="mt-6 w-full max-w-sm bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-md flex items-center justify-center gap-2 cursor-pointer">
                পোস্টার ডাউনলোড করুন (JPEG)
            </button>
        </div>

    </div>

    <script>
        function updatePost() {
            const name = document.getElementById('inputName').value.trim();
            const comment = document.getElementById('inputComment').value.trim();
            const imageInput = document.getElementById('inputImage');
            
            if(name !== "") {
                document.getElementById('viewName').innerText = name;
            } else {
                document.getElementById('viewName').innerText = "আপনার নাম";
            }

            if(comment !== "") {
                document.getElementById('viewComment').innerText = comment;
            } else {
                document.getElementById('viewComment').innerText = "চিতোষী এলাকার সার্বিক উন্নয়নের লক্ষ্যে অবিলম্বে উপজেলা ঘোষণা করা হোক।";
            }

            if (imageInput.files && imageInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('viewImage').src = e.target.result;
                }
                reader.readAsDataURL(imageInput.files[0]);
            }
        }

        function downloadJPEG() {
            // ১. ইউজার ডাটা চেক করার জন্য ইউজার এজেন্ট নেওয়া
            const ua = navigator.userAgent.toLowerCase();
            
            // ২. ইউআরএল প্যারামিটার থেকে চেক করা যে অলরেডি ক্রোমে রিডাইরেক্টেড কি না
            const urlParams = new URLSearchParams(window.location.search);
            const isForcedChrome = urlParams.get('browser') === 'chrome';

            // ৩. চিতোষী সেবা অ্যাপ (WebView), ফেসবুক বা ইন-অ্যাপ ডিটেকশন লজিক
            const isAppWebView = ua.includes("wv") || ua.includes("fban") || ua.includes("fbav") || ua.includes("instagram");

            // ৪. যদি ইউজার আপনার অ্যাপের (WebView) ভেতরে থাকে এবং এখনো ক্রোম ফোর্স ইউআরএলে না যায়
            if (isAppWebView && !isForcedChrome) {
                // বর্তমান ওয়েবসাইটের ইউআরএল বের করা
                let currentUrl = window.location.href;
                
                // ইউআরএল এর সাথে একটি ট্র্যাকিং প্যারামিটার যোগ করা যাতে ক্রোমে গিয়ে লুপ না হয়
                if (currentUrl.includes('?')) {
                    currentUrl += '&browser=chrome';
                } else {
                    currentUrl += '?browser=chrome';
                }
                
                // ক্লিন প্রোটোকল লিংক তৈরি (http/https সরিয়ে দেওয়া)
                const cleanUrl = currentUrl.replace(/^https?:\/\//, '');
                
                // অ্যান্ড্রয়েড সিস্টেমের মূল ক্রোম ব্রাউজার ওপেন করার অফিশিয়াল ইনটেন্ট লিংক
                const chromeIntent = "intent://" + cleanUrl + "#Intent;scheme=https;package=com.android.chrome;end";
                
                // ইউজারকে মেসেজ দিয়ে সরাসরি ফোনের ক্রোমে ট্রান্সফার করা
                alert("চিতোষী সেবা অ্যাপ থেকে ক্রোম ব্রাউজার ওপেন করা হচ্ছে। সঠিক ডাউনলোডের জন্য ক্রোম ব্রাউজারে তথ্য দিয়ে ডাউনলোড বাটনে চাপ দিন।");
                window.location.href = chromeIntent;
                return;
            }

            // ৫. ক্রোম ব্রাউজারে থাকলে সরাসরি ক্যানভাস তৈরি করে ডাউনলোড প্রসেস হবে
            const poster = document.getElementById('posterCard');
            
            html2canvas(poster, {
                useCORS: true, 
                allowTaint: true,
                scale: 3, // ক্রিস্টাল ক্লিয়ার এইচডি ছবির জন্য স্কেল ৩
                backgroundColor: '#f0fdf4',
                logging: false
            }).then(canvas => {
                canvas.toBlob(function(blob) {
                    const link = document.createElement('a');
                    link.download = 'chitoshi_upazila_poster.jpg';
                    link.href = URL.createObjectURL(blob);
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }, 'image/jpeg', 1.0); // সর্বোচ্চ হাই কোয়ালিটি JPEG
            }).catch(err => {
                console.error("ডাউনলোড করতে সমস্যা হয়েছে:", err);
                alert("দুঃখিত, ছবি সেভ করা যায়নি। দয়া করে গুগল ক্রোম ব্রাউজার ব্যবহার করুন।");
            });
        }
    </script>
</body>
</html>
