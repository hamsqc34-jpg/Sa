<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>চিতোষী উপজেলা চাই - পোস্ট মেকার</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: #f0fdf4;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <div class="bg-white p-6 rounded-2xl shadow-lg border border-green-100 flex flex-col justify-between">
            <div>
                <h2 class="text-2xl font-bold text-center text-green-700 mb-6">তথ্য যুক্ত করুন</h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-gray-700 font-semibold mb-1">নাম</label>
                        <input type="text" id="inputName" oninput="updatePost()" placeholder="আপনার নাম লিখুন" 
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none">
                    </div>

                    <div>
                        <label class="block text-gray-700 font-semibold mb-1">মন্তব্য</label>
                        <textarea id="inputComment" rows="3" oninput="updatePost()" placeholder="আপনার মন্তব্য বা মতামত লিখুন" 
                                  class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none"></textarea>
                    </div>

                    <div>
                        <label class="block text-gray-700 font-semibold mb-1">ছবি আপলোড করুন</label>
                        <input type="file" id="inputImage" onchange="updatePost()" accept="image/*" 
                               class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100 cursor-pointer">
                    </div>

                    <button onclick="updatePost()" 
                            class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-md cursor-pointer">
                        পোস্টে যুক্ত করুন
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-lg border border-green-100 flex flex-col items-center justify-between">
            <h2 class="text-xl font-bold text-gray-700 mb-4 text-center">সবাই একসাথে আওয়াজ তুলুন</h2>
            
            <div id="posterCard" class="w-full max-w-sm bg-gradient-to-b from-green-50 to-green-100 rounded-2xl p-6 border-4 border-green-600 shadow-inner relative flex flex-col justify-between aspect-square">
                
                <div class="flex justify-between items-start gap-4">
                    <div class="w-24 h-24 bg-gray-200 rounded-full border-4 border-white shadow-md flex items-center justify-center overflow-hidden shrink-0">
                        <img id="viewImage" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23cccccc'/></svg>" alt="User Photo" class="w-full h-full object-cover">
                    </div>
                    
                    <div class="flex-1 bg-white/90 p-3 rounded-xl border border-green-200 min-h-[96px] max-h-[120px] overflow-y-auto">
                        <p class="text-xs text-gray-500 font-bold mb-0.5">মন্তব্য:</p>
                        <p id="viewComment" class="text-sm text-gray-700 font-medium leading-relaxed">চিতোষী এলাকার সার্বিক উন্নয়নের লক্ষ্যে অবিলম্বে উপজেলা ঘোষণা করা হোক।</p>
                    </div>
                </div>

                <div class="my-2 text-center flex flex-col items-center justify-center relative">
                    <div class="mb-2 max-w-[60px] max-h-[60px] overflow-hidden">
                        <img id="logoView" src="https://i.postimg.cc/6QJ02jGV/20260518-125112.png" crossOrigin="anonymous" alt="Logo" class="w-full h-full object-contain">
                    </div>

                    <div class="bg-red-600 text-white font-black text-xl px-4 py-1 rounded-md shadow-sm transform -rotate-1 tracking-wide">
                        চিতোষী নামে
                    </div>
                    <div class="text-green-700 font-black text-2xl mt-1 tracking-wider drop-shadow-sm">
                        উপজেলাচাই
                    </div>
                </div>

                <div class="w-full bg-green-700 rounded-xl py-2 shadow-md text-center">
                    <span id="viewName" class="text-white font-bold text-base block w-full">আপনার নাম</span>
                </div>
            </div>

            <button onclick="downloadJPEG()" 
                    class="mt-6 w-full max-w-sm bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-md flex items-center justify-center gap-2 cursor-pointer">
                পোস্টার ডাউনলোড করুন (JPEG)
            </button>
        </div>

    </div>

    <canvas id="hiddenCanvas" style="display:none;"></canvas>

    <script>
        let userImageBase64 = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><circle cx='50' cy='50' r='40' fill='%23cccccc'/></svg>";

        function updatePost() {
            const name = document.getElementById('inputName').value.trim();
            const comment = document.getElementById('inputComment').value.trim();
            const imageInput = document.getElementById('inputImage');
            
            if(name !== "") {
                document.getElementById('viewName').innerText = name;
            } else {
                document.getElementById('viewName').innerText = "আপনার নাম";
            }

            if(comment !== "") {
                document.getElementById('viewComment').innerText = comment;
            } else {
                document.getElementById('viewComment').innerText = "চিতোষী এলাকার সার্বিক উন্নয়নের লক্ষ্যে অবিলম্বে উপজেলা ঘোষণা করা হোক।";
            }

            if (imageInput.files && imageInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    userImageBase64 = e.target.result;
                    document.getElementById('viewImage').src = userImageBase64;
                }
                reader.readAsDataURL(imageInput.files[0]);
            }
        }

        // html2canvas এর সিকিউরিটি জটলা ছাড়া সরাসরি ড্রয়িং ও ডাউনলোডের মেথড
        function downloadJPEG() {
            const canvas = document.getElementById('hiddenCanvas');
            const ctx = canvas.getContext('2d');
            
            // হাই-ডেফিনিশন স্কয়ার সাইজ (1000x1000px)
            canvas.width = 1000;
            canvas.height = 1000;

            // ১. ব্যাকগ্রাউন্ড গ্রেডিয়েন্ট
            let gradient = ctx.createLinearGradient(0, 0, 0, 1000);
            gradient.addColorStop(0, '#f0fdf4');
            gradient.addColorStop(1, '#dcfce7');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 1000, 1000);

            // ২. মূল সবুজ বর্ডার
            ctx.strokeStyle = '#16a34a';
            ctx.lineWidth = 18;
            ctx.strokeRect(35, 35, 930, 930);

            const nameText = document.getElementById('viewName').innerText;
            const commentText = document.getElementById('viewComment').innerText;

            let userImg = new Image();
            userImg.src = userImageBase64;
            
            userImg.onload = function() {
                // প্রোফাইল পিকচার (বাম পাশে)
                ctx.save();
                ctx.beginPath();
                ctx.arc(220, 220, 110, 0, Math.PI * 2);
                ctx.closePath();
                ctx.clip();
                ctx.drawImage(userImg, 110, 110, 220, 220);
                ctx.restore();

                // প্রোফাইল পিকচারের সাদা বর্ডার
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 12;
                ctx.beginPath();
                ctx.arc(220, 220, 110, 0, Math.PI * 2);
                ctx.stroke();

                // ৩. মন্তব্য বক্স (ডান পাশে)
                ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
                ctx.strokeStyle = '#bbf7d0';
                ctx.lineWidth = 3;
                roundRect(ctx, 400, 110, 490, 220, 24, true, true);

                // মন্তব্য হেডার ও মূল টেক্সট
                ctx.fillStyle = '#4b5563';
                ctx.font = 'bold 28px "Hind Siliguri", sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText("মন্তব্য:", 425, 160);

                ctx.fillStyle = '#374151';
                ctx.font = '500 30px "Hind Siliguri", sans-serif';
                wrapText(ctx, commentText, 425, 210, 440, 42);

                // ৪. মাঝের লোগো লোড ও রেন্ডার
                let logoImg = new Image();
                logoImg.src = document.getElementById('logoView').src;
                logoImg.crossOrigin = "anonymous";
                
                logoImg.onload = function() {
                    ctx.drawImage(logoImg, 435, 420, 130, 130);

                    // ৫. লাল ব্যানার (চিতোষী নামে)
                    ctx.save();
                    ctx.translate(500, 640);
                    ctx.rotate(-0.02);
                    ctx.fillStyle = '#dc2626';
                    roundRect(ctx, -190, -50, 380, 85, 12, true, false);
                    
                    ctx.fillStyle = '#ffffff';
                    ctx.font = '900 46px "Hind Siliguri", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText("চিতোষী নামে", 0, 10);
                    ctx.restore();

                    // ৬. সবুজ স্লোগান টেক্সট (উপজেলা চাই)
                    ctx.fillStyle = '#15803d';
                    ctx.font = '900 64px "Hind Siliguri", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText("উপজেলা চাই", 500, 770);

                    // ৭. আপনার নাম ব্যানার (নিচে)
                    ctx.fillStyle = '#047857';
                    roundRect(ctx, 110, 835, 780, 90, 24, true, false);

                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 42px "Hind Siliguri", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(nameText, 500, 895);

                    // সরাসরি আগের মতো ব্যাকগ্রাউন্ড ডাউনলোড ট্রিগার
                    canvas.toBlob(function(blob) {
                        const link = document.createElement('a');
                        link.download = 'chitoshi_upazila_poster.jpg';
                        link.href = URL.createObjectURL(blob);
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                    }, 'image/jpeg', 1.0);
                };
            };
        }

        function roundRect(ctx, x, y, width, height, radius, fill, stroke) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
            if (fill) ctx.fill();
            if (stroke) ctx.stroke();
        }

        function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
            const words = text.split(' ');
            let line = '';
            for (let n = 0; n < words.length; n++) {
                let testLine = line + words[n] + ' ';
                let metrics = ctx.measureText(testLine);
                let testWidth = metrics.width;
                if (testWidth > maxWidth && n > 0) {
                    ctx.fillText(line, x, y);
                    line = words[n] + ' ';
                    y += lineHeight;
                } else {
                    line = testLine;
                }
            }
            ctx.fillText(line, x, y);
        }
    </script>
</body>
</html>
